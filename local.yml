---
- hosts: localhost
  connection: local
  pre_tasks:
    - name: "Create {{ zshrc_d_prefix }} config directory"
      ansible.builtin.file:
        path: "{{ zshrc_d_prefix }}"
        state: directory
        mode: "0755"
      tags: always
  roles:
    - utils
    - zsh
    - role: linux
      when: ansible_facts.system == 'Linux'
    - role: windows
      when: ansible_facts.system == 'Linux' and is_wsl
