---
- name: "Homebrew: Install dependencies"
  ansible.builtin.package:
    name:
      - build-essential
      - procps
      - curl
      - file
      - git
      - tar
    state: present
  become: true

- name: "Homebrew: Create prefix directory"
  ansible.builtin.file:
    path: "{{ homebrew_prefix }}"
    state: directory
    owner: "{{ ansible_facts.user_id }}"
    group: "{{ ansible_facts.user_id }}"
    mode: "0755"
  become: true

- name: "Homebrew: Install Homebrew"
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://github.com/Homebrew/brew/tarball/main | tar xz --strip 1 -C {{ homebrew_prefix }}
    eval "$({{ homebrew_prefix }}/bin/brew shellenv)"
    brew update --force --quiet
    chmod -R go-w {{ homebrew_prefix }}/share/zsh
  args:
    creates: "{{ homebrew_prefix }}/bin/brew"

- name: "Homebrew: Add taps"
  community.general.homebrew_tap:
    name: oven-sh/bun
    state: present

- name: "Homebrew: Install packages"
  community.general.homebrew:
    name:
      # System utils
      - btop
      - htop
      - ripgrep
      - fd
      - bat
      - eza
      - neovim
      - fzf
      - glow
      - gdu # gdu-go
      - starship
      - neofetch
      # Typescript dev tools
      - oven-sh/bun/bun
      - npm
      - pnpm
      # Python dev tools
      - uv
    state: present

- name: "Homebrew: Configure packages"

  ansible.builtin.shell: |
    $(brew --prefix)/opt/fzf/install --all
  args:
    creates: ~/.fzf.zsh

- name: "Homebrew: eza create config directory"
  ansible.builtin.file:
    path: ~/.config/eza
    state: directory
    mode: '0755'

- name: "Homebrew: eza download theme"
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/eza-community/eza-themes/refs/heads/main/themes/catppuccin-mocha.yml
    dest: ~/.config/eza/theme.yml
    mode: '0644'

- name: "Homebrew: Add path for zsh-eza"
  ansible.builtin.copy:
    dest: "~/.zprofile"
    content: |
      add_path() {
        if [ -d "$1" ] && [[ ":$PATH:" != *":$1:"* ]]; then
          PATH="$PATH:$1"
        fi
      }
      add_path {{ homebrew_prefix }}/bin
    mode: "0644"
