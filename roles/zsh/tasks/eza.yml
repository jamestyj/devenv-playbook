# eza is a modern, maintained "ls" replacement.
# It gives more features and colours to distinguish file types and metadata.
# It knows about symlinks, extended attributes, and Git. And it’s small,
# fast, and just one single binary.
---
- name: "eza: Install package"
  community.general.homebrew:
    name:
      - eza
    state: present

- name: "eza: Create config directory"
  ansible.builtin.file:
    path: ~/.config/eza
    state: directory
    mode: "0755"

- name: "eza: Install catppuccin-mocha theme"
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/eza-community/eza-themes/refs/heads/main/themes/catppuccin-mocha.yml
    dest: ~/.config/eza/theme.yml
    mode: "0644"

- name: "eza: Add path for zsh-eza"
  ansible.builtin.copy:
    dest: "~/.zprofile"
    content: |
      add_path() {
        if [ -d "$1" ] && [[ ":$PATH:" != *":$1:"* ]]; then
          PATH="$PATH:$1"
        fi
      }
      add_path {{ homebrew_prefix }}/bin
    mode: "0644"
