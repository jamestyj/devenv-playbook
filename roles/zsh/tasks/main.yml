---
- name: "zsh: Install package"
  ansible.builtin.package:
    name:
      - zsh
    state: present
  become: true
  when: ansible_facts.system == 'Linux'

- name: "zsh: Set zsh as default shell"
  ansible.builtin.user:
    name: "{{ ansible_facts.user_id }}"
    shell: /bin/zsh
  become: true
  when: ansible_facts.system == 'Linux'

- ansible.builtin.include_tasks:
    file: oh-my-zsh.yml
    apply:
      tags: oh-my-zsh
  tags: oh-my-zsh
- ansible.builtin.include_tasks:
    file: fzf.yml
    apply:
      tags: fzf
  tags: fzf
- ansible.builtin.include_tasks:
    file: eza.yml
    apply:
      tags: eza
  tags: eza
- ansible.builtin.include_tasks:
    file: starship.yml
    apply:
      tags: starship
  tags: starship

- name: "zsh: Add {{ zshrc_d_prefix }}/*.zsh loader to ~/.zshrc"
  ansible.builtin.blockinfile:
    path: "~/.zshrc"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED - zshrc.d loader"
    block: |
      # Load {{ zshrc_d_prefix }}/*.zsh
      for ZSH_FILE in {{ zshrc_d_prefix }}/*.zsh(N); do
        source "${ZSH_FILE}"
      done

- name: "zsh: Add WSL home directory fix to ~/.zshrc"
  ansible.builtin.blockinfile:
    path: "~/.zshrc"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED - WSL home directory"
    block: |
      # WSL: Change to Linux home directory
      if [ -n "$WSL_DISTRO_NAME" ]; then
        cd ~
      fi
  when: is_wsl | bool

