---
- name: "Install package"
  ansible.builtin.package:
    name:
      - zsh
    state: present
  become: true

- name: "Set zsh as default shell"
  ansible.builtin.user:
    name: "{{ ansible_facts.user_id }}"
    shell: /bin/zsh
  become: true

- ansible.builtin.include_tasks: oh-my-zsh.yml
- ansible.builtin.import_tasks: fzf.yml
- ansible.builtin.import_tasks: eza.yml
- ansible.builtin.include_tasks: starship.yml

- name: "Add {{ zshrc_d_prefix }}/*.zsh loader to ~/.zshrc"
  ansible.builtin.blockinfile:
    path: "~/.zshrc"
    block: |
      # Load {{ zshrc_d_prefix }}/*.zsh
      for ZSH_FILE in {{ zshrc_d_prefix }}/*.zsh(N); do
        source "${ZSH_FILE}"
      done

      # WSL: Change to Linux home directory
      cd ~
