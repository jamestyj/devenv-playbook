---
- name: "claude-usage-tracker: Tap hamed-elfayome/claude-usage"
  community.general.homebrew_tap:
    name: hamed-elfayome/claude-usage
    state: present
  when: ansible_facts['os_family'] == 'Darwin'

- name: "claude-usage-tracker: Install Claude Usage Tracker"
  community.general.homebrew_cask:
    name: claude-usage-tracker
    state: present
  when: ansible_facts['os_family'] == 'Darwin'
