---
- name: "tmux/catppuccin: Create config directory"
  ansible.builtin.file:
    path: "~/.config/tmux/plugins/catppuccin"
    state: directory
    mode: "0755"

- name: "tmux/catppuccin: Install plugin"
  ansible.builtin.git:
    repo: https://github.com/catppuccin/tmux
    dest: "~/.config/tmux/plugins/catppuccin/tmux"
    update: "{{ update_plugins | default(false) | bool }}"

- name: "tmux/catppuccin: Create tmux-cpu plugin directory"
  ansible.builtin.file:
    path: "~/.config/tmux/plugins/tmux-plugins"
    state: directory
    mode: "0755"

- name: "tmux/catppuccin: Install tmux-cpu plugin"
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tmux-cpu
    dest: "~/.config/tmux/plugins/tmux-plugins/tmux-cpu"
    update: "{{ update_plugins | default(false) | bool }}"

- name: "tmux/catppuccin: Create config"
  ansible.builtin.copy:
    dest: "~/.tmux.conf"
    mode: "0644"
    content: |

      # Options to make tmux more pleasant
      set -g mouse on
      set -g default-terminal "tmux-256color"

      # Start window and pane numbering at 1
      set -g base-index 1
      setw -g pane-base-index 1

      # Configure the catppuccin plugin
      set -g @catppuccin_flavor "mocha"
      set -g @catppuccin_window_status_style "rounded"

      # Load catppuccin
      run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

      # Make the status line pretty and add some modules
      set -g status-right-length 100
      set -g status-left-length 100
      set -g status-left ""
      set -g status-right "#{E:@catppuccin_status_application}"
      set -agF status-right "#{E:@catppuccin_status_cpu}"
      set -ag status-right "#{E:@catppuccin_status_session}"
      set -ag status-right "#{E:@catppuccin_status_uptime}"

      run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
