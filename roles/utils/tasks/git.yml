---
- name: "git: Add .gitconfig"
  ansible.builtin.copy:
    dest: "~/.gitconfig"
    force: "{{ force_git_config | default(false) }}"
    mode: "0644"
    content: |
      [user]
        email = {{ git_user_email }}
        name = {{ git_user_name }}
      [alias]
        co = checkout
        br = branch
        ci = commit
        st = status
        cp = cherry-pick
      [push]
        autoSetupRemote = true
      [core]
        editor = nvim
        pager = less -F
