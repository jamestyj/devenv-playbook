---
- name: "opencode: Tap opencode"
  community.general.homebrew_tap:
    name: anomalyco/tap
    state: present

- name: "opencode: Install package"
  community.general.homebrew:
    name: opencode
    state: present

- name: "opencode: Create config directory"
  ansible.builtin.file:
    path: "~/.local/share/opencode"
    state: directory
    mode: "0755"

- name: "opencode: Check if auth.json exists"
  ansible.builtin.stat:
    path: "~/.local/share/opencode/auth.json"
  register: utils_opencode_auth

- name: "opencode: Set permissions on auth.json"
  ansible.builtin.file:
    path: "~/.local/share/opencode/auth.json"
    mode: "0600"
  when: utils_opencode_auth.stat.exists
