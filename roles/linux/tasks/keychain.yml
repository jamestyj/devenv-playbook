---
# Removes the need to keep re-entering SSH passphrase when working with Git in
# VS Code and its derivatives.
#
# Works by installing keychain (which manages SSH agents and their environment
# variables) and configuring it for VS Code.

- name: "linux/keychain: Install keychain"
  ansible.builtin.package:
    name: keychain
    state: present
  become: true

- name: "linux/keychain: Create VS Code config directory"
  ansible.builtin.file:
    path: "~/.vscode-server"
    state: directory
    mode: "0755"

- name: "linux/keychain: Create VS Code config"
  ansible.builtin.copy:
    dest: "~/.vscode-server/server-env-setup"
    content: |
      eval $(keychain --eval --agents ssh id_ed25519)
    mode: "0644"

- ansible.builtin.include_role:
    name: zsh
    tasks_from: mkdir_zshrc_d_prefix.yml

- name: "linux/keychain: Create Keychain config"
  ansible.builtin.copy:
    dest: "{{ zshrc_d_prefix }}/keychain.zsh"
    mode: "0644"
    content: |
      eval `keychain --eval --agents ssh id_ed25519`
